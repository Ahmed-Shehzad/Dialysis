# SPA CI for the per-context React apps under src/frontend/*-web:
# install → format check → lint → typecheck → unit tests → build, one job per app.
name: Frontend CI

on:
  push:
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "src/frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Husky hooks are dev-only; CI doesn't need them.
  HUSKY: "0"

jobs:
  spa:
    name: ${{ matrix.app }} build + checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - his-web
          - ehr-web
          - pdms-web
          - smartconnect-web
          - hie-web
          - identity-web
          - patient-portal-web
    defaults:
      run:
        working-directory: src/frontend/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Format check (Prettier)
        run: npm run format:check

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Build
        run: npm run build
