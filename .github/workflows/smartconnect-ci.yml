# SmartConnect module CI: build + test Dialysis.SmartConnect.Tests.
# Separate from smartconnect-pdf-sot.yml (PDF source-of-truth + Git LFS gate).
name: SmartConnect CI

on:
  push:
    paths:
      - "src/backend/SmartConnect/**"
      - "src/backend/Shared/**"
      - "src/backend/BuildingBlocks/**"
      - "src/backend/CQRS/**"
      - "src/backend/DomainDrivenDesign/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
      - "global.json"
      - ".github/workflows/smartconnect-ci.yml"
  pull_request:
    paths:
      - "src/backend/SmartConnect/**"
      - "src/backend/Shared/**"
      - "src/backend/BuildingBlocks/**"
      - "src/backend/CQRS/**"
      - "src/backend/DomainDrivenDesign/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
      - "global.json"
      - ".github/workflows/smartconnect-ci.yml"
  workflow_dispatch:

concurrency:
  group: smartconnect-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  smartconnect:
    name: SmartConnect build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build SmartConnect tests
        run: dotnet build src/backend/SmartConnect/Tests/Dialysis.SmartConnect.Tests/Dialysis.SmartConnect.Tests.csproj --configuration Release

      - name: Test
        run: >
          dotnet test src/backend/SmartConnect/Tests/Dialysis.SmartConnect.Tests/Dialysis.SmartConnect.Tests.csproj
          --configuration Release --no-build
          --logger "trx;LogFileName=smartconnect-tests.trx"
          --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartconnect-test-results
          path: artifacts/test-results
