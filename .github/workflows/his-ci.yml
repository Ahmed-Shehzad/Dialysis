# HIS: in-memory integration tests + optional SQL Server + RabbitMQ outbox relay golden path.
# Env contract and operator notes: src/backend/HIS/his_production_deployment.md, his_transponder_e2e_runbook.md
name: HIS CI

on:
  push:
    paths:
      - "src/backend/HIS/**"
      - ".github/workflows/his-ci.yml"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
  pull_request:
    paths:
      - "src/backend/HIS/**"
      - ".github/workflows/his-ci.yml"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"

jobs:
  his:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "HisCi_Sql_Passw0rd!"
        ports:
          - "1433:1433"
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - "5672:5672"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Wait for SQL Server and RabbitMQ
        run: sleep 25

      - name: Build HIS tests
        run: dotnet build src/backend/HIS/Dialysis.HIS.Tests/Dialysis.HIS.Tests.csproj --configuration Release

      - name: Test (in-memory; outbox golden path skipped)
        run: >
          dotnet test src/backend/HIS/Dialysis.HIS.Tests/Dialysis.HIS.Tests.csproj
          --configuration Release --no-build
          --filter "FullyQualifiedName!~HisOutboxRelayGoldenPathTests"

      - name: Outbox relay golden path (SQL + Rabbit)
        env:
          HIS_CI_OUTBOX_E2E: "1"
          ConnectionStrings__His: "Server=127.0.0.1,1433;Database=HisCi;User Id=sa;Password=HisCi_Sql_Passw0rd!;TrustServerCertificate=True;Encrypt=False;"
          His__Transponder__EnableOutboxRelay: "true"
          His__Transponder__RabbitMq__ConnectionUri: "amqp://guest:guest@127.0.0.1:5672/"
        run: >
          dotnet test src/backend/HIS/Dialysis.HIS.Tests/Dialysis.HIS.Tests.csproj
          --configuration Release --no-build
          --filter "FullyQualifiedName~HisOutboxRelayGoldenPathTests"
