# NUKE build pipeline. Exercises the strongly-typed build in build/_build.csproj end-to-end and
# publishes the NuGet packages as workflow artifacts — the packaging path the plain-dotnet
# workflows (solution-ci.yml et al.) don't cover. Path-filtered to the build infrastructure so it
# doesn't add load to every product PR; run the full suite locally with `./build.sh Test`.
name: NUKE CI

on:
  push:
    paths:
      - "build/**"
      - ".nuke/**"
      - "build.sh"
      - "build.cmd"
      - "build.ps1"
      - "Directory.Packages.props"
      - ".github/workflows/nuke-ci.yml"
  pull_request:
    paths:
      - "build/**"
      - ".nuke/**"
      - "build.sh"
      - "build.cmd"
      - "build.ps1"
      - "Directory.Packages.props"
      - ".github/workflows/nuke-ci.yml"
  workflow_dispatch:

concurrency:
  group: nuke-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  nuke:
    name: NUKE Compile + Pack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Pack (Release) via NUKE
        run: ./build.sh Pack --configuration Release

      - name: Upload NuGet packages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg
          if-no-files-found: error
