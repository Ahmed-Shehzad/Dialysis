# FHIR building-block CI: build + test the cross-cutting FHIR R4 primitives
# (mappers, readers/searchers, SMART scopes, bulk data, subscriptions, etc.).
name: BuildingBlocks FHIR CI

on:
  push:
    paths:
      - "src/backend/BuildingBlocks/Fhir/**"
      - "src/backend/Shared/**"
      - "src/backend/CQRS/**"
      - "src/backend/DomainDrivenDesign/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
      - "global.json"
      - ".github/workflows/buildingblocks-fhir-ci.yml"
  pull_request:
    paths:
      - "src/backend/BuildingBlocks/Fhir/**"
      - "src/backend/Shared/**"
      - "src/backend/CQRS/**"
      - "src/backend/DomainDrivenDesign/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
      - "global.json"
      - ".github/workflows/buildingblocks-fhir-ci.yml"
  workflow_dispatch:

concurrency:
  group: buildingblocks-fhir-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  fhir:
    name: FHIR building block build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build FHIR tests
        run: dotnet build src/backend/BuildingBlocks/Fhir/Dialysis.BuildingBlocks.Fhir.Tests/Dialysis.BuildingBlocks.Fhir.Tests.csproj --configuration Release

      - name: Test
        run: >
          dotnet test src/backend/BuildingBlocks/Fhir/Dialysis.BuildingBlocks.Fhir.Tests/Dialysis.BuildingBlocks.Fhir.Tests.csproj
          --configuration Release --no-build
          --logger "trx;LogFileName=fhir-tests.trx"
          --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildingblocks-fhir-test-results
          path: artifacts/test-results
