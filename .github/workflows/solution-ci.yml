# Solution-wide gates: full build of Dialysis.slnx and the NetArchTest-based
# module boundary enforcement. Per-module test runs live in their own workflows
# (ehr-ci.yml, pdms-ci.yml, …).
name: Solution CI

on:
  push:
    paths:
      - "src/backend/**"
      - "tests/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
      - "global.json"
      - ".github/workflows/solution-ci.yml"
  pull_request:
    paths:
      - "src/backend/**"
      - "tests/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
      - "global.json"
      - ".github/workflows/solution-ci.yml"
  workflow_dispatch:

concurrency:
  group: solution-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  build:
    name: Build solution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Dialysis.slnx

      - name: Build (Release, no restore)
        run: dotnet build Dialysis.slnx --configuration Release --no-restore

  architecture-tests:
    name: Architecture gates (module boundaries)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Run architecture tests
        run: >
          dotnet test tests/Dialysis.ArchitectureTests/Dialysis.ArchitectureTests.csproj
          --configuration Release
          --logger "trx;LogFileName=architecture-tests.trx"
          --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-tests-results
          path: artifacts/test-results
