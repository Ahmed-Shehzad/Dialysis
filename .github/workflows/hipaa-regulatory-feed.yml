name: HIPAA regulatory feed

# Daily scheduled check of OCR/HHS HIPAA guidance pages. When the content drifts vs. the
# checked-in snapshot, opens (or updates) a tracking issue tagged `hipaa-regulatory-change`
# so engineering reviews the diff and updates the snapshot after acknowledgement.
#
# Why this exists: the marketing claim "you'll never have to worry about staying up to date
# with regulatory changes" needs an automated probe, not a manual calendar reminder. This
# workflow is the probe.

on:
  schedule:
    # 07:13 UTC daily — odd minute to avoid the top-of-hour GitHub scheduling slosh.
    - cron: "13 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: hipaa-regulatory-feed
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run drift check
        id: check
        continue-on-error: true
        run: |
          python3 tools/hipaa/check_ocr_feed.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue on drift
        if: steps.check.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('tools/hipaa/drift.md', 'utf8');
            const title = `HIPAA regulatory feed drift detected ${new Date().toISOString().slice(0, 10)}`;
            const labels = ['hipaa-regulatory-change'];

            // De-dup: if there's already an open issue with this label, comment on it; else create.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels.join(','),
              state: 'open',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            }
