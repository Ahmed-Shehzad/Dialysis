# PDMS module CI: build + test Dialysis.PDMS.Tests in isolation.
name: PDMS CI

on:
  push:
    paths:
      - "src/backend/PDMS/**"
      - "src/backend/Shared/**"
      - "src/backend/BuildingBlocks/**"
      - "src/backend/CQRS/**"
      - "src/backend/DomainDrivenDesign/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
      - "global.json"
      - ".github/workflows/pdms-ci.yml"
  pull_request:
    paths:
      - "src/backend/PDMS/**"
      - "src/backend/Shared/**"
      - "src/backend/BuildingBlocks/**"
      - "src/backend/CQRS/**"
      - "src/backend/DomainDrivenDesign/**"
      - "Directory.Packages.props"
      - "Directory.Build.props"
      - "Dialysis.slnx"
      - "global.json"
      - ".github/workflows/pdms-ci.yml"
  workflow_dispatch:

concurrency:
  group: pdms-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"

jobs:
  pdms:
    name: PDMS build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Build PDMS tests
        run: dotnet build src/backend/PDMS/Dialysis.PDMS.Tests/Dialysis.PDMS.Tests.csproj --configuration Release

      - name: Test
        run: >
          dotnet test src/backend/PDMS/Dialysis.PDMS.Tests/Dialysis.PDMS.Tests.csproj
          --configuration Release --no-build
          --logger "trx;LogFileName=pdms-tests.trx"
          --results-directory artifacts/test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdms-test-results
          path: artifacts/test-results
