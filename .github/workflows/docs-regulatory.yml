# Documentation + regulatory gates. Two independent jobs that don't touch the .NET build:
#
#  1. pdf-source-of-truth — verifies the SmartConnect Mirth user-guide PDF (Git LFS) TOC and
#     traceability artifacts are in sync. Runs on push/PR that touch the PDF SOT tooling or docs.
#  2. hipaa-regulatory-feed — daily scheduled probe of OCR/HHS HIPAA guidance pages; opens/updates
#     a tracking issue when the content drifts vs. the checked-in snapshot.
name: Docs & Regulatory

on:
  push:
    paths:
      - "tools/smartconnect/**"
      - "docs/book/**"
      - ".github/workflows/docs-regulatory.yml"
  pull_request:
    paths:
      - "tools/smartconnect/**"
      - "docs/book/**"
      - ".github/workflows/docs-regulatory.yml"
  schedule:
    # 07:13 UTC daily — odd minute to avoid the top-of-hour GitHub scheduling slosh.
    - cron: "13 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # SmartConnect PDF source of truth. Requires docs/book/mirth-connect-user-guide.pdf
  # (Git LFS materialized). Skipped on the daily schedule (it's a push/PR gate).
  pdf-source-of-truth:
    name: SmartConnect PDF source of truth
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with Git LFS)
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PDF tooling dependencies
        run: python3 -m pip install -r tools/smartconnect/requirements.txt

      - name: Verify committed TOC matches PDF
        run: python3 tools/smartconnect/verify_toc_committed.py

      - name: Verify traceability markdown is generated
        run: python3 tools/smartconnect/generate_traceability_md.py --check

      - name: Validate traceability vs TOC
        run: python3 tools/smartconnect/validate_traceability.py

  # Daily OCR/HHS HIPAA guidance drift check. Opens (or comments on) a tracking issue tagged
  # `hipaa-regulatory-change` when content drifts vs. the checked-in snapshot. Schedule/dispatch only.
  hipaa-regulatory-feed:
    name: HIPAA regulatory feed
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: hipaa-regulatory-feed
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run drift check
        id: check
        continue-on-error: true
        run: |
          python3 tools/hipaa/check_ocr_feed.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Open issue on drift
        if: steps.check.outputs.exit_code == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('tools/hipaa/drift.md', 'utf8');
            const title = `HIPAA regulatory feed drift detected ${new Date().toISOString().slice(0, 10)}`;
            const labels = ['hipaa-regulatory-change'];

            // De-dup: if there's already an open issue with this label, comment on it; else create.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: labels.join(','),
              state: 'open',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels,
              });
            }
