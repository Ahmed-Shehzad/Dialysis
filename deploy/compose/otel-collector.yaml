# yaml-language-server: $schema=./otel-collector.schema.json
# ^ This is an OpenTelemetry *Collector* config, not an SDK declarative-config file.
#   The modeline pins the schema so editors don't match the SDK schema by filename
#   (which would wrongly demand a top-level 'file_format' property).
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Stdout dump — keeps local dev simple. Swap for a real backend (Tempo, Jaeger,
  # Honeycomb, Datadog, etc.) by adding the relevant exporter block and wiring it
  # into the pipelines below.
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
