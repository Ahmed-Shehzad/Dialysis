receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

exporters:
  # Stdout dump — keeps local dev simple. Swap for a real backend (Tempo, Jaeger,
  # Honeycomb, Datadog, etc.) by adding the relevant exporter block and wiring it
  # into the pipelines below.
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
