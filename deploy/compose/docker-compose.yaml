services:
  rabbitmq:
    image: "docker.io/library/rabbitmq:4.3-management"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    expose:
      - "5672"
      - "15672"
    networks:
      - "aspire"
  valkey:
    image: "docker.io/valkey/valkey:9.1"
    command:
      - "-c"
      - "valkey-server --requirepass $$VALKEY_PASSWORD"
    entrypoint:
      - "/bin/sh"
    environment:
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
    expose:
      - "6379"
    networks:
      - "aspire"
  keycloak:
    image: "quay.io/keycloak/keycloak:26.0"
    command:
      - "start-dev"
      - "--import-realm"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_DB: "dev-mem"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    expose:
      - "8080"
    volumes:
      - type: "bind"
        target: "/opt/keycloak/data/import"
        source: "${KEYCLOAK_BINDMOUNT_0}"
        read_only: true
    networks:
      - "aspire"
  postgres-his:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_HIS_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-his-data"
        read_only: false
    networks:
      - "aspire"
  postgres-ehr:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_EHR_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-ehr-data"
        read_only: false
    networks:
      - "aspire"
  postgres-pdms:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PDMS_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-pdms-data"
        read_only: false
    networks:
      - "aspire"
  postgres-smartconnect:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_SMARTCONNECT_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-smartconnect-data"
        read_only: false
    networks:
      - "aspire"
  postgres-hie:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_HIE_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-hie-data"
        read_only: false
    networks:
      - "aspire"
  postgres-sonarqube:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${SONAR_PG_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-sonarqube-pg-data"
        read_only: false
    networks:
      - "aspire"
  sonarqube:
    image: "sonarqube:26.5.0.122743-community"
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://postgres-sonarqube:5432/postgres"
      SONAR_JDBC_USERNAME: "postgres"
      SONAR_JDBC_PASSWORD: "${SONAR_PG_PASSWORD}"
    expose:
      - "9000"
    volumes:
      - type: "volume"
        target: "/opt/sonarqube/data"
        source: "dialysis-sonarqube-data"
        read_only: false
      - type: "volume"
        target: "/opt/sonarqube/logs"
        source: "dialysis-sonarqube-logs"
        read_only: false
      - type: "volume"
        target: "/opt/sonarqube/extensions"
        source: "dialysis-sonarqube-extensions"
        read_only: false
    depends_on:
      postgres-sonarqube:
        condition: "service_started"
    networks:
      - "aspire"
  sonarqube-bootstrap:
    image: "curlimages/curl:8.11.0"
    command:
      - "/bootstrap.sh"
    entrypoint:
      - "/bin/sh"
    environment:
      SONAR_URL: "http://sonarqube:9000"
      SONAR_ADMIN_USER: "admin"
      SONAR_ADMIN_PASSWORD: "admin"
      SONAR_PROJECT_KEY: "dialysis"
      SONAR_PROJECT_NAME: "Dialysis Modular Monolith"
    volumes:
      - type: "bind"
        target: "/bootstrap.sh"
        source: "${SONARQUBE_BOOTSTRAP_BINDMOUNT_0}"
        read_only: true
      - type: "volume"
        target: "/state"
        source: "dialysis-sonarqube-bootstrap"
        read_only: false
    depends_on:
      sonarqube:
        condition: "service_started"
    networks:
      - "aspire"
  his-api:
    image: "${HIS_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${HIS_API_PORT}"
      ConnectionStrings__His: "Host=postgres-his;Port=5432;Username=postgres;Password=${POSTGRES_HIS_PASSWORD};Database=dialysis_his"
      HIS_HOST: "postgres-his"
      HIS_PORT: "5432"
      HIS_USERNAME: "postgres"
      HIS_PASSWORD: "${POSTGRES_HIS_PASSWORD}"
      HIS_URI: "postgresql://postgres:${POSTGRES_HIS_PASSWORD}@postgres-his:5432/dialysis_his"
      HIS_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-his:5432/dialysis_his"
      HIS_DATABASENAME: "dialysis_his"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379,password=${VALKEY_PASSWORD}"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
      VALKEY_URI: "valkey://:${VALKEY_PASSWORD}@valkey:6379"
      His__Transponder__EnableOutboxRelay: "true"
      His__Transponder__RabbitMq__ConnectionUri: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      His__DistributedCache__Valkey__ConnectionString: "valkey:6379,password=${VALKEY_PASSWORD}"
      His__Authentication__Authority: "http://keycloak:8080/realms/dialysis"
      His__Authentication__Audience: "account"
      His__Fhir__Enabled: "true"
    expose:
      - "${HIS_API_PORT}"
    depends_on:
      postgres-his:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
      valkey:
        condition: "service_started"
      keycloak:
        condition: "service_started"
    networks:
      - "aspire"
  ehr-api:
    image: "${EHR_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${EHR_API_PORT}"
      ConnectionStrings__Ehr: "Host=postgres-ehr;Port=5432;Username=postgres;Password=${POSTGRES_EHR_PASSWORD};Database=dialysis_ehr"
      EHR_HOST: "postgres-ehr"
      EHR_PORT: "5432"
      EHR_USERNAME: "postgres"
      EHR_PASSWORD: "${POSTGRES_EHR_PASSWORD}"
      EHR_URI: "postgresql://postgres:${POSTGRES_EHR_PASSWORD}@postgres-ehr:5432/dialysis_ehr"
      EHR_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-ehr:5432/dialysis_ehr"
      EHR_DATABASENAME: "dialysis_ehr"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379,password=${VALKEY_PASSWORD}"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
      VALKEY_URI: "valkey://:${VALKEY_PASSWORD}@valkey:6379"
      Ehr__Transponder__EnableOutboxRelay: "true"
      Ehr__Transponder__RabbitMq__ConnectionUri: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      Ehr__DistributedCache__Valkey__ConnectionString: "valkey:6379,password=${VALKEY_PASSWORD}"
      Ehr__Authentication__Authority: "http://keycloak:8080/realms/dialysis"
      Ehr__Authentication__Audience: "account"
      Ehr__Demo__Enabled: "true"
      Ehr__Demo__RegistrationSimulator: "true"
    expose:
      - "${EHR_API_PORT}"
    depends_on:
      postgres-ehr:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
      valkey:
        condition: "service_started"
      keycloak:
        condition: "service_started"
    networks:
      - "aspire"
  pdms-api:
    image: "${PDMS_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${PDMS_API_PORT}"
      ConnectionStrings__Pdms: "Host=postgres-pdms;Port=5432;Username=postgres;Password=${POSTGRES_PDMS_PASSWORD};Database=dialysis_pdms"
      PDMS_HOST: "postgres-pdms"
      PDMS_PORT: "5432"
      PDMS_USERNAME: "postgres"
      PDMS_PASSWORD: "${POSTGRES_PDMS_PASSWORD}"
      PDMS_URI: "postgresql://postgres:${POSTGRES_PDMS_PASSWORD}@postgres-pdms:5432/dialysis_pdms"
      PDMS_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-pdms:5432/dialysis_pdms"
      PDMS_DATABASENAME: "dialysis_pdms"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379,password=${VALKEY_PASSWORD}"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
      VALKEY_URI: "valkey://:${VALKEY_PASSWORD}@valkey:6379"
      Pdms__Transponder__EnableOutboxRelay: "true"
      Pdms__Transponder__RabbitMq__ConnectionUri: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      Pdms__DistributedCache__Valkey__ConnectionString: "valkey:6379,password=${VALKEY_PASSWORD}"
      Pdms__Authentication__Authority: "http://keycloak:8080/realms/dialysis"
      Pdms__Authentication__Audience: "account"
      Pdms__Demo__Enabled: "true"
      Pdms__Demo__VitalsTicker: "true"
      Pdms__Demo__MachineTelemetrySimulator: "true"
    expose:
      - "${PDMS_API_PORT}"
    depends_on:
      postgres-pdms:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
      valkey:
        condition: "service_started"
      keycloak:
        condition: "service_started"
    networks:
      - "aspire"
  smartconnect-api:
    image: "${SMARTCONNECT_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${SMARTCONNECT_API_PORT}"
      ConnectionStrings__SmartConnect: "Host=postgres-smartconnect;Port=5432;Username=postgres;Password=${POSTGRES_SMARTCONNECT_PASSWORD};Database=dialysis_smartconnect"
      SMARTCONNECT_HOST: "postgres-smartconnect"
      SMARTCONNECT_PORT: "5432"
      SMARTCONNECT_USERNAME: "postgres"
      SMARTCONNECT_PASSWORD: "${POSTGRES_SMARTCONNECT_PASSWORD}"
      SMARTCONNECT_URI: "postgresql://postgres:${POSTGRES_SMARTCONNECT_PASSWORD}@postgres-smartconnect:5432/dialysis_smartconnect"
      SMARTCONNECT_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-smartconnect:5432/dialysis_smartconnect"
      SMARTCONNECT_DATABASENAME: "dialysis_smartconnect"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379,password=${VALKEY_PASSWORD}"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
      VALKEY_URI: "valkey://:${VALKEY_PASSWORD}@valkey:6379"
      SmartConnect__Transponder__EnableOutboxRelay: "true"
      SmartConnect__Transponder__RabbitMq__ConnectionUri: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      SmartConnect__DistributedCache__Valkey__ConnectionString: "valkey:6379,password=${VALKEY_PASSWORD}"
      SmartConnect__Authentication__Authority: "http://keycloak:8080/realms/dialysis"
      SmartConnect__Authentication__Audience: "account"
      SmartConnect__Demo__Enabled: "true"
      SmartConnect__Demo__Hl7Simulator: "true"
      SmartConnect__SourceConnectors__0__Name: "Hl7Mllp"
      SmartConnect__SourceConnectors__0__Kind: "mllp"
      SmartConnect__SourceConnectors__0__DefaultFlowId: "b1d10001-0001-4000-8000-000000000001"
      SmartConnect__SourceConnectors__0__Parameters__Port: "2575"
      SmartConnect__SourceConnectors__1__Name: "LocalDrop"
      SmartConnect__SourceConnectors__1__Kind: "file-reader"
      SmartConnect__SourceConnectors__1__DefaultFlowId: "b1d10001-0001-4000-8000-000000000001"
      SmartConnect__SourceConnectors__1__Parameters__Directory: "./tmp/smartconnect/drop"
      SmartConnect__SourceConnectors__1__Parameters__Pattern: "*.hl7"
    expose:
      - "${SMARTCONNECT_API_PORT}"
    depends_on:
      postgres-smartconnect:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
      valkey:
        condition: "service_started"
      keycloak:
        condition: "service_started"
    networks:
      - "aspire"
  hie-api:
    image: "${HIE_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${HIE_API_PORT}"
      ConnectionStrings__Hie: "Host=postgres-hie;Port=5432;Username=postgres;Password=${POSTGRES_HIE_PASSWORD};Database=dialysis_hie"
      HIE_HOST: "postgres-hie"
      HIE_PORT: "5432"
      HIE_USERNAME: "postgres"
      HIE_PASSWORD: "${POSTGRES_HIE_PASSWORD}"
      HIE_URI: "postgresql://postgres:${POSTGRES_HIE_PASSWORD}@postgres-hie:5432/dialysis_hie"
      HIE_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-hie:5432/dialysis_hie"
      HIE_DATABASENAME: "dialysis_hie"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379,password=${VALKEY_PASSWORD}"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
      VALKEY_URI: "valkey://:${VALKEY_PASSWORD}@valkey:6379"
      Hie__Transponder__RabbitMq__ConnectionUri: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      Hie__DistributedCache__Valkey__ConnectionString: "valkey:6379,password=${VALKEY_PASSWORD}"
      Hie__Authentication__Authority: "http://keycloak:8080/realms/dialysis"
      Hie__Authentication__Audience: "account"
      Hie__Demo__Enabled: "true"
    expose:
      - "${HIE_API_PORT}"
    depends_on:
      postgres-hie:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
      valkey:
        condition: "service_started"
      keycloak:
        condition: "service_started"
    networks:
      - "aspire"
  identity-bff:
    image: "${IDENTITY_BFF_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "5275"
      ASPNETCORE_URLS: "http://localhost:5275"
      Identity__Keycloak__Authority: "http://keycloak:8080/realms/dialysis"
      ReverseProxy__Clusters__his__Destinations__d1__Address: "http://his-api:${HIS_API_PORT}"
    expose:
      - "5275"
      - "${IDENTITY_BFF_PORT}"
    depends_on:
      keycloak:
        condition: "service_started"
      his-api:
        condition: "service_started"
    networks:
      - "aspire"
  gateway:
    image: "${GATEWAY_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "9090"
      ASPNETCORE_URLS: "http://localhost:9090"
      HIS_API_HTTP: "http://his-api:${HIS_API_PORT}"
      services__his-api__http__0: "http://his-api:${HIS_API_PORT}"
      HIS_API_HTTPS: "https://his-api:${HIS_API_PORT}"
      EHR_API_HTTP: "http://ehr-api:${EHR_API_PORT}"
      services__ehr-api__http__0: "http://ehr-api:${EHR_API_PORT}"
      EHR_API_HTTPS: "https://ehr-api:${EHR_API_PORT}"
      PDMS_API_HTTP: "http://pdms-api:${PDMS_API_PORT}"
      services__pdms-api__http__0: "http://pdms-api:${PDMS_API_PORT}"
      PDMS_API_HTTPS: "https://pdms-api:${PDMS_API_PORT}"
      SMARTCONNECT_API_HTTP: "http://smartconnect-api:${SMARTCONNECT_API_PORT}"
      services__smartconnect-api__http__0: "http://smartconnect-api:${SMARTCONNECT_API_PORT}"
      SMARTCONNECT_API_HTTPS: "https://smartconnect-api:${SMARTCONNECT_API_PORT}"
      HIE_API_HTTP: "http://hie-api:${HIE_API_PORT}"
      services__hie-api__http__0: "http://hie-api:${HIE_API_PORT}"
      HIE_API_HTTPS: "https://hie-api:${HIE_API_PORT}"
      IDENTITY_BFF_HTTP: "http://identity-bff:5275"
      services__identity-bff__http__0: "http://identity-bff:5275"
      IDENTITY_BFF_HTTPS: "https://identity-bff:${IDENTITY_BFF_PORT}"
      Gateway__Authority: "http://keycloak:8080/realms/dialysis"
      Gateway__Audience: "account"
      Gateway__RequireAuthentication: "true"
      ReverseProxy__Clusters__identity__Destinations__d1__Address: "http://localhost:5275/"
    expose:
      - "9090"
      - "${GATEWAY_PORT}"
    depends_on:
      his-api:
        condition: "service_started"
      ehr-api:
        condition: "service_started"
      pdms-api:
        condition: "service_started"
      smartconnect-api:
        condition: "service_started"
      hie-api:
        condition: "service_started"
      identity-bff:
        condition: "service_started"
    networks:
      - "aspire"
  web:
    image: "${WEB_IMAGE}"
    environment:
      NODE_ENV: "production"
      GATEWAY_HTTP: "http://gateway:9090"
      services__gateway__http__0: "http://gateway:9090"
      GATEWAY_HTTPS: "https://gateway:${GATEWAY_PORT}"
      BROWSER: "none"
      VITE_GATEWAY_URL: "http://gateway:9090"
      VITE_API_BASE_URL: "http://gateway:9090"
      PORT: "5173"
    expose:
      - "5173"
    depends_on:
      gateway:
        condition: "service_started"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  dialysis-postgres-his-data:
    driver: "local"
  dialysis-postgres-ehr-data:
    driver: "local"
  dialysis-postgres-pdms-data:
    driver: "local"
  dialysis-postgres-smartconnect-data:
    driver: "local"
  dialysis-postgres-hie-data:
    driver: "local"
  dialysis-sonarqube-pg-data:
    driver: "local"
  dialysis-sonarqube-data:
    driver: "local"
  dialysis-sonarqube-logs:
    driver: "local"
  dialysis-sonarqube-extensions:
    driver: "local"
  dialysis-sonarqube-bootstrap:
    driver: "local"
