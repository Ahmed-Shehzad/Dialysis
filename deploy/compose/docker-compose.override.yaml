# Production overlay for the Aspire-generated docker-compose.yaml.
#
# `docker-compose.yaml` (in this same folder) is regenerated by
# `./build.sh PublishCompose` from the Aspire AppHost — it captures the topology
# (services, env vars, networks, volumes, dependencies). This file adds the
# concerns that aren't yet expressible in the AppHost model:
#
#   • build: stanzas pointing at the existing repo-root Dockerfiles so
#     `docker compose up --build` works without a pre-pushed registry.
#   • Host port mappings so the browser-facing services (gateway, web,
#     Keycloak, SonarQube) and the per-module Postgres ports match what the
#     legacy docker-compose.modules.yml exposed (5440-5445, 8081, 9000, 9090).
#   • ASP.NET production hardening — ASPNETCORE_ENVIRONMENT + UseHsts +
#     UseForwardedHeaders + RequireAuthorityWhenNotDevelopment.
#   • Per-module Postgres healthchecks (Aspire only emits the connection
#     string; depends_on with condition: service_healthy is a deploy
#     concern).
#   • deploy.replicas: 1 baseline + `docker compose up --scale his-api=3`
#     stays the documented scale-out path.
#
# Run:
#   docker compose -f docker-compose.yaml -f docker-compose.override.yaml up -d --build
#
# Treat this overlay as the production-only complement: the generated YAML
# stays in lockstep with the AppHost; this file moves over time as more of
# its concerns get pushed into the AppHost itself.

services:
  # --- Per-module Postgres: published ports + healthchecks ---------------
  postgres-his:
    ports: ["5440:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_his"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres-smartconnect:
    ports: ["5441:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_smartconnect"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres-ehr:
    ports: ["5442:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_ehr"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres-pdms:
    ports: ["5443:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_pdms"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres-hie:
    ports: ["5445:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_hie"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Shared infra: external endpoints ----------------------------------
  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"
  valkey:
    ports: ["6379:6379"]
  keycloak:
    ports: ["8081:8080"]
  sonarqube:
    ports: ["9000:9000"]

  # --- OTLP collector ----------------------------------------------------
  # Aspire's dev dashboard handles telemetry locally; in production we hand
  # spans + metrics to an OpenTelemetry Collector that the operator points at
  # their backend (Tempo / Jaeger / Honeycomb / Datadog). The shipped config
  # in otel-collector.yaml dumps to stdout — swap the exporter block to wire
  # a real backend.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    networks: ["aspire"]
    ports:
      - "4317:4317"
      - "4318:4318"

  # --- Module APIs: build context + production hardening ----------------
  his-api:
    build:
      context: ../..
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/HIS/Dialysis.HIS.Api/Dialysis.HIS.Api.csproj
        MODULE_DLL: Dialysis.HIS.Api.dll
    image: dialysis/his-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      His__UseHsts: "true"
      His__UseForwardedHeaders: "true"
      His__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      His__Telemetry__OtlpEndpoint: "http://otel-collector:4317"
    ports: ["5288:8080"]
    deploy: { replicas: 1 }
  ehr-api:
    build:
      context: ../..
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/EHR/Dialysis.EHR.Api/Dialysis.EHR.Api.csproj
        MODULE_DLL: Dialysis.EHR.Api.dll
    image: dialysis/ehr-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Ehr__UseHsts: "true"
      Ehr__UseForwardedHeaders: "true"
      Ehr__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      Ehr__Telemetry__OtlpEndpoint: "http://otel-collector:4317"
    ports: ["5289:8080"]
    deploy: { replicas: 1 }
  pdms-api:
    build:
      context: ../..
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/PDMS/Dialysis.PDMS.Api/Dialysis.PDMS.Api.csproj
        MODULE_DLL: Dialysis.PDMS.Api.dll
    image: dialysis/pdms-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Pdms__UseHsts: "true"
      Pdms__UseForwardedHeaders: "true"
      Pdms__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      Pdms__Telemetry__OtlpEndpoint: "http://otel-collector:4317"
    ports: ["5290:8080"]
    deploy: { replicas: 1 }
  smartconnect-api:
    build:
      context: ../..
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/SmartConnect/Api/Dialysis.SmartConnect.Api/Dialysis.SmartConnect.Api.csproj
        MODULE_DLL: Dialysis.SmartConnect.Api.dll
    image: dialysis/smartconnect-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      SmartConnect__UseHsts: "true"
      SmartConnect__UseForwardedHeaders: "true"
      SmartConnect__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      SmartConnect__Telemetry__OtlpEndpoint: "http://otel-collector:4317"
    ports: ["5291:8080"]
    deploy: { replicas: 1 }
  hie-api:
    build:
      context: ../..
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/HIE/Dialysis.HIE.Api/Dialysis.HIE.Api.csproj
        MODULE_DLL: Dialysis.HIE.Api.dll
    image: dialysis/hie-api:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Hie__UseHsts: "true"
      Hie__UseForwardedHeaders: "true"
      Hie__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      Hie__Telemetry__OtlpEndpoint: "http://otel-collector:4317"
    ports: ["5292:8080"]
    deploy: { replicas: 1 }

  # --- Identity BFF: build + bind to 0.0.0.0 -----------------------------
  identity-bff:
    build:
      context: ../..
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/Identity/Dialysis.Identity.Bff/Dialysis.Identity.Bff.csproj
        MODULE_DLL: Dialysis.Identity.Bff.dll
    image: dialysis/identity-bff:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # The Aspire-generated YAML carries ASPNETCORE_URLS=http://localhost:5275
      # because the AppHost binds to localhost for dev. In a container we need
      # to bind on all interfaces so the gateway can reach the BFF over the
      # compose network.
      ASPNETCORE_URLS: "http://+:5275"
    ports: ["5275:5275"]

  # --- YARP gateway: build + browser-facing port + production hardening --
  gateway:
    build:
      context: ../..
      dockerfile: Dockerfile.gateway
    image: dialysis/gateway:latest
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: "http://+:9090"
      Gateway__UseHsts: "true"
      Gateway__UseForwardedHeaders: "true"
      # Redirect the BFF cluster to the container hostname (not localhost,
      # which the AppHost wrote in for dev).
      ReverseProxy__Clusters__identity__Destinations__d1__Address: "http://identity-bff:5275/"
    ports: ["9090:9090"]

  # --- Web SPA: built from the per-app Dockerfile ------------------------
  web:
    build:
      context: ../../src/frontend/dialysis-web
      dockerfile: Dockerfile
    image: dialysis/web:latest
    ports: ["8080:80"]
