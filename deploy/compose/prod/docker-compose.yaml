services:
  rabbitmq:
    image: "docker.io/library/rabbitmq:4.3-management"
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    ports:
      - "5672:5672"
      - "15672:15672"
    expose:
      - "5672"
      - "15672"
    networks:
      - "aspire"
  valkey:
    image: "docker.io/valkey/valkey:9.1"
    command:
      - "-c"
      - "valkey-server --requirepass $$VALKEY_PASSWORD"
    entrypoint:
      - "/bin/sh"
    environment:
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
    ports:
      - "6379:6379"
    expose:
      - "6379"
    networks:
      - "aspire"
  keycloak:
    image: "quay.io/keycloak/keycloak:26.0"
    command:
      - "start-dev"
      - "--import-realm"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_DB: "dev-mem"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8081:8080"
    expose:
      - "8080"
    volumes:
      - type: "bind"
        target: "/opt/keycloak/data/import"
        source: "${KEYCLOAK_BINDMOUNT_0}"
        read_only: true
    networks:
      - "aspire"
  postgres-his:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_HIS_PASSWORD}"
    ports:
      - "5440:5432"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-his-data"
        read_only: false
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d dialysis_his"
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "5s"
  postgres-ehr:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_EHR_PASSWORD}"
    ports:
      - "5442:5432"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-ehr-data"
        read_only: false
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d dialysis_ehr"
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "5s"
  postgres-pdms:
    image: "docker.io/timescale/timescaledb:latest-pg17"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_PDMS_PASSWORD}"
    ports:
      - "5443:5432"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-pdms-data"
        read_only: false
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d dialysis_pdms"
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "5s"
  postgres-smartconnect:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_SMARTCONNECT_PASSWORD}"
    ports:
      - "5441:5432"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-smartconnect-data"
        read_only: false
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d dialysis_smartconnect"
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "5s"
  postgres-hie:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_HIE_PASSWORD}"
    ports:
      - "5445:5432"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-hie-data"
        read_only: false
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d dialysis_hie"
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "5s"
  postgres-lab:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_LAB_PASSWORD}"
    ports:
      - "5446:5432"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-lab-data"
        read_only: false
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d dialysis_lab"
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "5s"
  postgres-hangfire:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${POSTGRES_HANGFIRE_PASSWORD}"
    ports:
      - "5447:5432"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-postgres-hangfire-data"
        read_only: false
    networks:
      - "aspire"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "pg_isready -U postgres -d dialysis_hangfire"
      interval: "5s"
      timeout: "3s"
      retries: 10
      start_period: "5s"
  postgres-sonarqube:
    image: "docker.io/postgres:17-alpine"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "${SONAR_PG_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "dialysis-sonarqube-pg-data"
        read_only: false
    networks:
      - "aspire"
  sonarqube:
    image: "sonarqube:26.5.0.122743-community"
    environment:
      SONAR_JDBC_URL: "jdbc:postgresql://postgres-sonarqube:5432/postgres"
      SONAR_JDBC_USERNAME: "postgres"
      SONAR_JDBC_PASSWORD: "${SONAR_PG_PASSWORD}"
    ports:
      - "9000:9000"
    expose:
      - "9000"
    volumes:
      - type: "volume"
        target: "/opt/sonarqube/data"
        source: "dialysis-sonarqube-data"
        read_only: false
      - type: "volume"
        target: "/opt/sonarqube/logs"
        source: "dialysis-sonarqube-logs"
        read_only: false
      - type: "volume"
        target: "/opt/sonarqube/extensions"
        source: "dialysis-sonarqube-extensions"
        read_only: false
    depends_on:
      postgres-sonarqube:
        condition: "service_started"
    networks:
      - "aspire"
  sonarqube-bootstrap:
    image: "curlimages/curl:8.11.0"
    command:
      - "/bootstrap.sh"
    entrypoint:
      - "/bin/sh"
    environment:
      SONAR_URL: "http://sonarqube:9000"
      SONAR_ADMIN_USER: "admin"
      SONAR_ADMIN_PASSWORD: "admin"
      SONAR_PROJECT_KEY: "dialysis"
      SONAR_PROJECT_NAME: "Dialysis Modular Monolith"
    volumes:
      - type: "bind"
        target: "/bootstrap.sh"
        source: "${SONARQUBE_BOOTSTRAP_BINDMOUNT_0}"
        read_only: true
      - type: "volume"
        target: "/state"
        source: "dialysis-sonarqube-bootstrap"
        read_only: false
    depends_on:
      sonarqube:
        condition: "service_started"
    networks:
      - "aspire"
  his-api:
    image: "${HIS_API_IMAGE}"
    build:
      context: "../../.."
      dockerfile: "Dockerfile.module"
      args:
        MODULE_PROJECT: "src/backend/HIS/Dialysis.HIS.Api/Dialysis.HIS.Api.csproj"
        MODULE_DLL: "Dialysis.HIS.Api.dll"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${HIS_API_PORT}"
      ConnectionStrings__His: "Host=postgres-his;Port=5432;Username=postgres;Password=${POSTGRES_HIS_PASSWORD};Database=dialysis_his"
      HIS_HOST: "postgres-his"
      HIS_PORT: "5432"
      HIS_USERNAME: "postgres"
      HIS_PASSWORD: "${POSTGRES_HIS_PASSWORD}"
      HIS_URI: "postgresql://postgres:${POSTGRES_HIS_PASSWORD}@postgres-his:5432/dialysis_his"
      HIS_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-his:5432/dialysis_his"
      HIS_DATABASENAME: "dialysis_his"
      ConnectionStrings__Hangfire: "Host=postgres-hangfire;Port=5432;Username=postgres;Password=${POSTGRES_HANGFIRE_PASSWORD};Database=dialysis_hangfire"
      HANGFIRE_HOST: "postgres-hangfire"
      HANGFIRE_PORT: "5432"
      HANGFIRE_USERNAME: "postgres"
      HANGFIRE_PASSWORD: "${POSTGRES_HANGFIRE_PASSWORD}"
      HANGFIRE_URI: "postgresql://postgres:${POSTGRES_HANGFIRE_PASSWORD}@postgres-hangfire:5432/dialysis_hangfire"
      HANGFIRE_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-hangfire:5432/dialysis_hangfire"
      HANGFIRE_DATABASENAME: "dialysis_hangfire"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379,password=${VALKEY_PASSWORD}"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
      VALKEY_URI: "valkey://:${VALKEY_PASSWORD}@valkey:6379"
      His__Transponder__EnableOutboxRelay: "true"
      His__Transponder__RabbitMq__ConnectionUri: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      His__DistributedCache__Valkey__ConnectionString: "valkey:6379,password=${VALKEY_PASSWORD}"
      His__Authentication__Authority: "http://keycloak:8080/realms/dialysis"
      His__Authentication__Audience: "account"
      His__Fhir__Enabled: "true"
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      His__UseHsts: "true"
      His__UseForwardedHeaders: "true"
      His__Telemetry__OtlpEndpoint: "http://otel-collector:4317"
      His__Authentication__RequireAuthorityWhenNotDevelopment: "true"
    ports:
      - "5288:8080"
    expose:
      - "${HIS_API_PORT}"
    depends_on:
      postgres-his:
        condition: "service_started"
      postgres-hangfire:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
      valkey:
        condition: "service_started"
      keycloak:
        condition: "service_started"
    networks:
      - "aspire"
    deploy:
      replicas: 2
  ehr-api:
    image: "${EHR_API_IMAGE}"
    build:
      context: "../../.."
      dockerfile: "Dockerfile.module"
      args:
        MODULE_PROJECT: "src/backend/EHR/Dialysis.EHR.Api/Dialysis.EHR.Api.csproj"
        MODULE_DLL: "Dialysis.EHR.Api.dll"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTP_PORTS: "${EHR_API_PORT}"
      ConnectionStrings__Ehr: "Host=postgres-ehr;Port=5432;Username=postgres;Password=${POSTGRES_EHR_PASSWORD};Database=dialysis_ehr"
      EHR_HOST: "postgres-ehr"
      EHR_PORT: "5432"
      EHR_USERNAME: "postgres"
      EHR_PASSWORD: "${POSTGRES_EHR_PASSWORD}"
      EHR_URI: "postgresql://postgres:${POSTGRES_EHR_PASSWORD}@postgres-ehr:5432/dialysis_ehr"
      EHR_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-ehr:5432/dialysis_ehr"
      EHR_DATABASENAME: "dialysis_ehr"
      ConnectionStrings__Hangfire: "Host=postgres-hangfire;Port=5432;Username=postgres;Password=${POSTGRES_HANGFIRE_PASSWORD};Database=dialysis_hangfire"
      HANGFIRE_HOST: "postgres-hangfire"
      HANGFIRE_PORT: "5432"
      HANGFIRE_USERNAME: "postgres"
      HANGFIRE_PASSWORD: "${POSTGRES_HANGFIRE_PASSWORD}"
      HANGFIRE_URI: "postgresql://postgres:${POSTGRES_HANGFIRE_PASSWORD}@postgres-hangfire:5432/dialysis_hangfire"
      HANGFIRE_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-hangfire:5432/dialysis_hangfire"
      HANGFIRE_DATABASENAME: "dialysis_hangfire"
      ConnectionStrings__rabbitmq: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      RABBITMQ_HOST: "rabbitmq"
      RABBITMQ_PORT: "5672"
      RABBITMQ_USERNAME: "guest"
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      RABBITMQ_URI: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      ConnectionStrings__valkey: "valkey:6379,password=${VALKEY_PASSWORD}"
      VALKEY_HOST: "valkey"
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: "${VALKEY_PASSWORD}"
      VALKEY_URI: "valkey://:${VALKEY_PASSWORD}@valkey:6379"
      Ehr__Transponder__EnableOutboxRelay: "true"
      Ehr__Transponder__RabbitMq__ConnectionUri: "amqp://guest:${RABBITMQ_PASSWORD}@rabbitmq:5672"
      Ehr__DistributedCache__Valkey__ConnectionString: "valkey:6379,password=${VALKEY_PASSWORD}"
      Ehr__Authentication__Authority: "http://keycloak:8080/realms/dialysis"
      Ehr__Authentication__Audience: "account"
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      Ehr__UseHsts: "true"
      Ehr__UseForwardedHeaders: "true"
      Ehr__Telemetry__OtlpEndpoint: "http://otel-collector:4317"
      Ehr__Authentication__RequireAuthorityWhenNotDevelopment: "true"
    ports:
      - "5289:8080"
    expose:
      - "${EHR_API_PORT}"
    depends_on:
      postgres-ehr:
        condition: "service_started"
      postgres-hangfire:
        condition: "service_started"
      rabbitmq:
        condition: "service_started"
      valkey:
        condition: "service_started"
      keycloak:
        condition: "service_started"
    networks:
      - "aspire"
    deploy:
      replicas: 2
  pdms-api:
