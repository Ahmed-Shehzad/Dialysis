---
# PgBouncer ConfigMap shared across modules; each Deployment mounts the same image and
# overrides the upstream Postgres hostname via env. Pool mode = transaction (compatible
# with EF Core SaveChangesAsync, which doesn't hold session state across statements).
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-shared-config
data:
  pgbouncer.ini: |
    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 1000
    default_pool_size = ${PGBOUNCER_POOL_SIZE}
    server_lifetime = 3600
    server_idle_timeout = 600
    ignore_startup_parameters = extra_float_digits
---
# One Deployment per module fronts the matching CNPG Cluster's rw Service.
{{- /* Five blocks below — manually unrolled because envsubst doesn't loop. */ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer-his
  labels: { app.kubernetes.io/name: dialysis, app.kubernetes.io/component: pgbouncer, dialysis.io/module: his }
spec:
  replicas: ${PGBOUNCER_REPLICAS}
  selector:
    matchLabels: { app.kubernetes.io/name: dialysis, dialysis.io/module: his, app.kubernetes.io/component: pgbouncer }
  template:
    metadata:
      labels: { app.kubernetes.io/name: dialysis, dialysis.io/module: his, app.kubernetes.io/component: pgbouncer }
    spec:
      containers:
      - name: pgbouncer
        image: bitnami/pgbouncer:1.23.1
        ports: [{ containerPort: 6432, name: pgbouncer }]
        env:
        - { name: POSTGRESQL_HOST,     value: "pg-his-rw" }
        - { name: POSTGRESQL_DATABASE, value: "his" }
        - { name: POSTGRESQL_USERNAME, valueFrom: { secretKeyRef: { name: pg-his-app-credentials, key: username } } }
        - { name: POSTGRESQL_PASSWORD, valueFrom: { secretKeyRef: { name: pg-his-app-credentials, key: password } } }
        - { name: PGBOUNCER_POOL_MODE, value: "transaction" }
        - { name: PGBOUNCER_DEFAULT_POOL_SIZE, value: "${PGBOUNCER_POOL_SIZE}" }
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-his
spec:
  selector: { app.kubernetes.io/name: dialysis, dialysis.io/module: his, app.kubernetes.io/component: pgbouncer }
  ports: [{ port: 6432, targetPort: 6432, name: pgbouncer }]
