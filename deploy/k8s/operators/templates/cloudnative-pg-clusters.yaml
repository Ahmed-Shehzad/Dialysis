---
# CloudNativePG Cluster — HIS module Postgres.
#
# The Service names that the Aspire-generated module Deployments connect to are:
#   pg-his-rw  (read/write — primary; PgBouncer fronts this)
#   pg-his-ro  (read-only — load-balances across replicas)
#   pg-his-r   (read — any replica including primary)
# The generated chart's ConnectionStrings__His env var points at pgbouncer-his (see
# pgbouncer.yaml), which transparently fronts pg-his-rw.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-his
  labels:
    app.kubernetes.io/name: dialysis
    app.kubernetes.io/component: postgres
    dialysis.io/module: his
spec:
  instances: ${CNPG_INSTANCES}
  primaryUpdateStrategy: unsupervised
  # Synchronous replication. With min=max=1, the primary commits only when at least one
  # standby has fsynced the WAL — zero RPO for clinical writes, as picked in the durability
  # plan. Set min=max=0 in dev to keep the loop fast on single-node clusters.
  minSyncReplicas: ${CNPG_MIN_SYNC_REPLICAS}
  maxSyncReplicas: ${CNPG_MAX_SYNC_REPLICAS}
  storage:
    size: ${CNPG_STORAGE_SIZE}
    storageClass: ${CNPG_STORAGE_CLASS}
  bootstrap:
    initdb:
      database: his
      owner: his
      secret:
        name: pg-his-app-credentials
  backup:
    barmanObjectStore:
      destinationPath: ${CNPG_BACKUP_BUCKET}/his
      s3Credentials:
        accessKeyId:
          name: pg-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-credentials
          key: SECRET_ACCESS_KEY
    retentionPolicy: "${CNPG_BACKUP_RETENTION}"
  monitoring:
    enablePodMonitor: true
---
