          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-credentials
          key: SECRET_ACCESS_KEY
    retentionPolicy: "${CNPG_BACKUP_RETENTION}"
  monitoring:
    enablePodMonitor: true
