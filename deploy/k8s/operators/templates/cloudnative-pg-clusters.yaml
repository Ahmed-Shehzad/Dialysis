---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-pdms
  labels:
    app.kubernetes.io/name: dialysis
    app.kubernetes.io/component: postgres
    dialysis.io/module: pdms
spec:
  # PDMS uses the timescale/timescaledb image for the hypertable on IntradialyticReadings
  # (see EF migration AddTimescaleHypertable). CNPG accepts an imageName override on the
  # cluster spec — we point at TimescaleDB's CNPG-compatible image. The Postgres major
  # matches the rest of the fleet (17).
  imageName: ghcr.io/timescale/cloudnative-pg-timescaledb:17
  instances: ${CNPG_INSTANCES}
  primaryUpdateStrategy: unsupervised
  # PDMS holds telemetry volume but is also clinically critical; same sync settings as
  # HIS/EHR. Phase 2 may tune this to async if write latency becomes a bottleneck once we
  # see real device-reading load.
  minSyncReplicas: ${CNPG_MIN_SYNC_REPLICAS}
  maxSyncReplicas: ${CNPG_MAX_SYNC_REPLICAS}
  storage:
    size: ${CNPG_STORAGE_SIZE}
    storageClass: ${CNPG_STORAGE_CLASS}
  postgresql:
    # TimescaleDB ships a planner extension that needs to load at server start. CNPG
    # surfaces shared_preload_libraries via the cluster's postgresql block; here we
    # ensure `timescaledb` is loaded before any user query runs.
    shared_preload_libraries:
      - timescaledb
  bootstrap:
    initdb:
      database: pdms
      owner: pdms
      secret:
        name: pg-pdms-app-credentials
      # CREATE EXTENSION runs as a post-bootstrap script so the extension is enabled
      # before the application connects + before any migration runs. The migration
      # itself also has CREATE EXTENSION IF NOT EXISTS as a belt-and-braces.
      postInitApplicationSQL:
        - "CREATE EXTENSION IF NOT EXISTS timescaledb;"
  backup:
    barmanObjectStore:
      destinationPath: ${CNPG_BACKUP_BUCKET}/pdms
      s3Credentials:
        accessKeyId:
          name: pg-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-credentials
          key: SECRET_ACCESS_KEY
    retentionPolicy: "${CNPG_BACKUP_RETENTION}"
  monitoring:
    enablePodMonitor: true
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-smartconnect
  labels:
    app.kubernetes.io/name: dialysis
    app.kubernetes.io/component: postgres
    dialysis.io/module: smartconnect
spec:
  instances: ${CNPG_INSTANCES}
  primaryUpdateStrategy: unsupervised
  # SmartConnect is integration plumbing, not patient PII. Async replication is acceptable
  # here — the workload is a routing/flow store, not a clinical record.
  minSyncReplicas: 0
  maxSyncReplicas: 0
  storage:
    size: ${CNPG_STORAGE_SIZE}
    storageClass: ${CNPG_STORAGE_CLASS}
  bootstrap:
    initdb:
      database: smartconnect
      owner: smartconnect
      secret:
        name: pg-smartconnect-app-credentials
  backup:
    barmanObjectStore:
      destinationPath: ${CNPG_BACKUP_BUCKET}/smartconnect
      s3Credentials:
        accessKeyId:
          name: pg-backup-credentials
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: pg-backup-credentials
          key: SECRET_ACCESS_KEY
    retentionPolicy: "${CNPG_BACKUP_RETENTION}"
  monitoring:
    enablePodMonitor: true
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-hie
  labels:
    app.kubernetes.io/name: dialysis
    app.kubernetes.io/component: postgres
    dialysis.io/module: hie
spec:
  instances: ${CNPG_INSTANCES}
  primaryUpdateStrategy: unsupervised
  # HIE is cross-org dispatch; the outbox + dispatch state is more recoverable than
  # clinical record loss. Async replication acceptable to favor write latency on the
  # outbound side.
  minSyncReplicas: 0
  maxSyncReplicas: 0
  storage:
    size: ${CNPG_STORAGE_SIZE}
    storageClass: ${CNPG_STORAGE_CLASS}
  bootstrap:
    initdb:
