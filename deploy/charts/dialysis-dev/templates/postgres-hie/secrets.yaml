---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "postgres-hie-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "postgres-hie"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  POSTGRES_PASSWORD: "{{ .Values.secrets.postgres_hie.postgres_hie_password }}"
type: "Opaque"
