---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "postgres-hie-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "postgres-hie"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  POSTGRES_HOST_AUTH_METHOD: "{{ .Values.config.postgres_hie.POSTGRES_HOST_AUTH_METHOD }}"
  POSTGRES_INITDB_ARGS: "{{ .Values.config.postgres_hie.POSTGRES_INITDB_ARGS }}"
  POSTGRES_USER: "{{ .Values.config.postgres_hie.POSTGRES_USER }}"
