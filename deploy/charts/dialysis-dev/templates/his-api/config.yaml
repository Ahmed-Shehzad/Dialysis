---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "his-api-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "his-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "{{ .Values.config.his_api.OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY }}"
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "{{ .Values.config.his_api.ASPNETCORE_FORWARDEDHEADERS_ENABLED }}"
  HTTP_PORTS: "{{ .Values.parameters.his_api.port_http | int | toString }}"
  HIS_HOST: "{{ .Values.config.his_api.HIS_HOST }}"
  HIS_PORT: "{{ .Values.config.his_api.HIS_PORT }}"
  HIS_USERNAME: "{{ .Values.config.his_api.HIS_USERNAME }}"
  HIS_JDBCCONNECTIONSTRING: "{{ .Values.config.his_api.HIS_JDBCCONNECTIONSTRING }}"
  HIS_DATABASENAME: "{{ .Values.config.his_api.HIS_DATABASENAME }}"
  RABBITMQ_HOST: "{{ .Values.config.his_api.RABBITMQ_HOST }}"
  RABBITMQ_PORT: "{{ .Values.config.his_api.RABBITMQ_PORT }}"
  RABBITMQ_USERNAME: "{{ .Values.config.his_api.RABBITMQ_USERNAME }}"
  VALKEY_HOST: "{{ .Values.config.his_api.VALKEY_HOST }}"
  VALKEY_PORT: "{{ .Values.config.his_api.VALKEY_PORT }}"
  His__Transponder__EnableOutboxRelay: "{{ .Values.config.his_api.His__Transponder__EnableOutboxRelay }}"
  His__Authentication__Authority: "{{ .Values.config.his_api.His__Authentication__Authority }}"
  His__Authentication__Audience: "{{ .Values.config.his_api.His__Authentication__Audience }}"
  His__Fhir__Enabled: "{{ .Values.config.his_api.His__Fhir__Enabled }}"
  His__Demo__Enabled: "{{ .Values.config.his_api.His__Demo__Enabled }}"
