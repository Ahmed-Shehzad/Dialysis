---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "hie-bff-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "hie-bff"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  Bff__Keycloak__ClientSecret: "{{ .Values.secrets.hie_bff.hie_bff_client_secret }}"
  ConnectionStrings__rabbitmq: "amqp://guest:{{ .Values.secrets.hie_bff.rabbitmq_password }}@rabbitmq-service:5672"
  RABBITMQ_PASSWORD: "{{ .Values.secrets.hie_bff.rabbitmq_password }}"
  RABBITMQ_URI: "amqp://guest:{{ .Values.secrets.hie_bff.rabbitmq_password }}@rabbitmq-service:5672"
  ConnectionStrings__valkey: "valkey-service:6379,password={{ .Values.secrets.hie_bff.valkey_password }}"
  VALKEY_PASSWORD: "{{ .Values.secrets.hie_bff.valkey_password }}"
  VALKEY_URI: "valkey://:{{ .Values.secrets.hie_bff.valkey_password }}@valkey-service:6379"
  ConnectionStrings__Hangfire: "Host=postgres-hangfire-service;Port=5432;Username=postgres;Password={{ .Values.secrets.hie_bff.postgres_hangfire_password }};Database=dialysis_hangfire"
  HANGFIRE_PASSWORD: "{{ .Values.secrets.hie_bff.postgres_hangfire_password }}"
  HANGFIRE_URI: "postgresql://postgres:{{ .Values.secrets.hie_bff.postgres_hangfire_password }}@postgres-hangfire-service:5432/dialysis_hangfire"
  Bff__Events__RabbitMq__ConnectionUri: "amqp://guest:{{ .Values.secrets.hie_bff.rabbitmq_password }}@rabbitmq-service:5672"
  Bff__Events__SignalR__BackplaneConnectionString: "valkey-service:6379,password={{ .Values.secrets.hie_bff.valkey_password }}"
type: "Opaque"
