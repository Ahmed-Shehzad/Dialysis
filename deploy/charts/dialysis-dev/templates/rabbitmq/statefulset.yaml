---
apiVersion: "apps/v1"
kind: "StatefulSet"
metadata:
  name: "rabbitmq-statefulset"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "rabbitmq"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "rabbitmq"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "docker.io/library/rabbitmq:4.3-management"
          name: "rabbitmq"
          envFrom:
            - configMapRef:
                name: "rabbitmq-config"
            - secretRef:
                name: "rabbitmq-secrets"
          ports:
            - name: "tcp"
              protocol: "TCP"
              containerPort: 5672
            - name: "management"
              protocol: "TCP"
              containerPort: 15672
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "100m"
              memory: "256Mi"
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "rabbitmq"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  persistentVolumeClaimRetentionPolicy: {}
  updateStrategy:
    rollingUpdate: {}
    type: "RollingUpdate"
