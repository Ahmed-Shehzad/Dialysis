---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "sonarqube-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "sonarqube"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  SONAR_JDBC_URL: "{{ .Values.config.sonarqube.SONAR_JDBC_URL }}"
  SONAR_JDBC_USERNAME: "{{ .Values.config.sonarqube.SONAR_JDBC_USERNAME }}"
