---
apiVersion: "networking.k8s.io/v1"
kind: "NetworkPolicy"
metadata:
  name: "allow-external-ingress-to-gateway"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "gateway"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: "gateway"
  policyTypes:
    - "Ingress"
  ingress:
    - from:
        - namespaceSelector: {}
