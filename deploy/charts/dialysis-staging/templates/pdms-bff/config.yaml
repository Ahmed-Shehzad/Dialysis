---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "pdms-bff-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "pdms-bff"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "{{ .Values.config.pdms_bff.OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY }}"
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "{{ .Values.config.pdms_bff.ASPNETCORE_FORWARDEDHEADERS_ENABLED }}"
  ASPNETCORE_URLS: "{{ .Values.config.pdms_bff.ASPNETCORE_URLS }}"
  Bff__Keycloak__Authority: "{{ .Values.config.pdms_bff.Bff__Keycloak__Authority }}"
  Bff__Module__ModuleApiAddress: "http://pdms-api-service:{{ .Values.parameters.pdms_api.port_http }}"
  RABBITMQ_HOST: "{{ .Values.config.pdms_bff.RABBITMQ_HOST }}"
  RABBITMQ_PORT: "{{ .Values.config.pdms_bff.RABBITMQ_PORT }}"
  RABBITMQ_USERNAME: "{{ .Values.config.pdms_bff.RABBITMQ_USERNAME }}"
  VALKEY_HOST: "{{ .Values.config.pdms_bff.VALKEY_HOST }}"
  VALKEY_PORT: "{{ .Values.config.pdms_bff.VALKEY_PORT }}"
  HANGFIRE_HOST: "{{ .Values.config.pdms_bff.HANGFIRE_HOST }}"
  HANGFIRE_PORT: "{{ .Values.config.pdms_bff.HANGFIRE_PORT }}"
  HANGFIRE_USERNAME: "{{ .Values.config.pdms_bff.HANGFIRE_USERNAME }}"
  HANGFIRE_JDBCCONNECTIONSTRING: "{{ .Values.config.pdms_bff.HANGFIRE_JDBCCONNECTIONSTRING }}"
  HANGFIRE_DATABASENAME: "{{ .Values.config.pdms_bff.HANGFIRE_DATABASENAME }}"
  Bff__Module__Aggregations__0__Address: "http://ehr-api-service:{{ .Values.parameters.ehr_api.port_http }}"
  Bff__Module__Aggregations__1__Address: "http://hie-api-service:{{ .Values.parameters.hie_api.port_http }}"
  Bff__Module__Aggregations__2__Address: "http://smartconnect-api-service:{{ .Values.parameters.smartconnect_api.port_http }}"
