---
apiVersion: "networking.k8s.io/v1"
kind: "NetworkPolicy"
metadata:
  name: "deny-cross-namespace-ingress"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "gateway"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  podSelector: {}
  policyTypes:
    - "Ingress"
  ingress:
    - from:
        - podSelector: {}
