---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "gateway-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "gateway"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "{{ .Values.config.gateway.OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY }}"
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "{{ .Values.config.gateway.ASPNETCORE_FORWARDEDHEADERS_ENABLED }}"
  HTTP_PORTS: "{{ .Values.config.gateway.HTTP_PORTS }}"
  ASPNETCORE_URLS: "{{ .Values.config.gateway.ASPNETCORE_URLS }}"
  Gateway__Authority: "{{ .Values.config.gateway.keycloak_authority }}"
  Gateway__Audience: "{{ .Values.config.gateway.Gateway__Audience }}"
  Gateway__RequireAuthentication: "{{ .Values.config.gateway.Gateway__RequireAuthentication }}"
  ReverseProxy__Clusters__identity__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__identity__Destinations__d1__Address }}"
  ReverseProxy__Clusters__his-bff__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__his_bff__Destinations__d1__Address }}"
  ReverseProxy__Clusters__ehr-bff__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__ehr_bff__Destinations__d1__Address }}"
