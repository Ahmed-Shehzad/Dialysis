  ReverseProxy__Clusters__smartconnect-bff__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__smartconnect_bff__Destinations__d1__Address }}"
  ReverseProxy__Clusters__hie-bff__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__hie_bff__Destinations__d1__Address }}"
  ReverseProxy__Clusters__admin-bff__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__admin_bff__Destinations__d1__Address }}"
  ReverseProxy__Clusters__portal-bff__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__portal_bff__Destinations__d1__Address }}"
  ReverseProxy__Clusters__his-web__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__his_web__Destinations__d1__Address }}"
  ReverseProxy__Clusters__ehr-web__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__ehr_web__Destinations__d1__Address }}"
  ReverseProxy__Clusters__pdms-web__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__pdms_web__Destinations__d1__Address }}"
  ReverseProxy__Clusters__smartconnect-web__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__smartconnect_web__Destinations__d1__Address }}"
  ReverseProxy__Clusters__hie-web__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__hie_web__Destinations__d1__Address }}"
  ReverseProxy__Clusters__admin-web__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__admin_web__Destinations__d1__Address }}"
  ReverseProxy__Clusters__portal-web__Destinations__d1__Address: "{{ .Values.config.gateway.ReverseProxy__Clusters__portal_web__Destinations__d1__Address }}"
