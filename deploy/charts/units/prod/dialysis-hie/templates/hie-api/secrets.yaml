---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "hie-api-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "hie-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  ConnectionStrings__Hie: "Host=postgres-hie-service;Port=5432;Username=postgres;Password={{ .Values.secrets.hie_api.postgres_hie_password }};Database=dialysis_hie"
  HIE_PASSWORD: "{{ .Values.secrets.hie_api.postgres_hie_password }}"
  HIE_URI: "postgresql://postgres:{{ .Values.secrets.hie_api.postgres_hie_password }}@postgres-hie-service:5432/dialysis_hie"
  ConnectionStrings__Hangfire: "Host=postgres-hie-service;Port=5432;Username=postgres;Password={{ .Values.secrets.hie_api.postgres_hie_password }};Database=dialysis_hie"
  HANGFIRE_PASSWORD: "{{ .Values.secrets.hie_api.postgres_hie_password }}"
  HANGFIRE_URI: "postgresql://postgres:{{ .Values.secrets.hie_api.postgres_hie_password }}@postgres-hie-service:5432/dialysis_hie"
type: "Opaque"
