---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "postgres-lab-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "postgres-lab"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  POSTGRES_PASSWORD: "{{ .Values.secrets.postgres_lab.postgres_lab_password }}"
type: "Opaque"
