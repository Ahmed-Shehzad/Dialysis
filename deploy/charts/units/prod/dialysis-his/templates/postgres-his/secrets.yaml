---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "postgres-his-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "postgres-his"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  POSTGRES_PASSWORD: "{{ .Values.secrets.postgres_his.postgres_his_password }}"
type: "Opaque"
