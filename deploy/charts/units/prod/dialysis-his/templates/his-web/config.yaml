---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "his-web-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "his-web"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  NODE_ENV: "{{ .Values.config.his_web.NODE_ENV }}"
  BROWSER: "{{ .Values.config.his_web.BROWSER }}"
  VITE_GATEWAY_URL: "{{ .Values.config.his_web.VITE_GATEWAY_URL }}"
  VITE_API_BASE_URL: "{{ .Values.config.his_web.VITE_API_BASE_URL }}"
  PORT: "{{ .Values.config.his_web.PORT }}"
