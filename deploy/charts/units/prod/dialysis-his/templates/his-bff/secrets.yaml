---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "his-bff-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "his-bff"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  Bff__Keycloak__ClientSecret: "{{ .Values.secrets.his_bff.his_bff_client_secret }}"
  ConnectionStrings__Hangfire: "Host=postgres-his-service;Port=5432;Username=postgres;Password={{ .Values.secrets.his_bff.postgres_his_password }};Database=dialysis_his"
  HANGFIRE_PASSWORD: "{{ .Values.secrets.his_bff.postgres_his_password }}"
  HANGFIRE_URI: "postgresql://postgres:{{ .Values.secrets.his_bff.postgres_his_password }}@postgres-his-service:5432/dialysis_his"
type: "Opaque"
