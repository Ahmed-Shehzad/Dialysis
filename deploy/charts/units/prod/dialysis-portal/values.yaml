parameters:
  portal_bff:
    portal_bff_image: "portal-bff:latest"
  patient_portal_web:
    patient_portal_web_image: "patient-portal-web:latest"
secrets:
  portal_bff:
    portal_bff_client_secret: ""
config:
  portal_bff:
    OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
    ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    ASPNETCORE_URLS: "http://+:5307"
    keycloak_authority: "http://keycloak-service:8081/realms/dialysis"
    Bff__Module__ModuleApiAddress: "http://his-api-service:8080"
    rabbitmq_connection: "amqp://guest:CHANGE-ME@rabbitmq-service:5672"
    valkey_connection: "valkey-service:6379,password=CHANGE-ME"
    hangfire_his_connection: "Host=postgres-his-service;Port=5432;Username=postgres;Password=CHANGE-ME;Database=dialysis_his"
    Bff__Module__Aggregations__0__Address: "http://ehr-api-service:8080"
    Bff__Module__Aggregations__1__Address: "http://pdms-api-service:8080"
    Bff__Module__Aggregations__2__Address: "http://hie-api-service:8080"
    Bff__Module__Aggregations__3__Address: "http://smartconnect-api-service:8080"
  patient_portal_web:
    NODE_ENV: "production"
    BROWSER: "none"
    VITE_GATEWAY_URL: "http://gateway-service:9090"
    VITE_API_BASE_URL: "http://gateway-service:9090"
    PORT: "5337"
