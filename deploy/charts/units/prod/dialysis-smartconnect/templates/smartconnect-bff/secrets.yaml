---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "smartconnect-bff-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "smartconnect-bff"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  Bff__Keycloak__ClientSecret: "{{ .Values.secrets.smartconnect_bff.smartconnect_bff_client_secret }}"
  ConnectionStrings__Hangfire: "Host=postgres-smartconnect-service;Port=5432;Username=postgres;Password={{ .Values.secrets.smartconnect_bff.postgres_smartconnect_password }};Database=dialysis_smartconnect"
  HANGFIRE_PASSWORD: "{{ .Values.secrets.smartconnect_bff.postgres_smartconnect_password }}"
  HANGFIRE_URI: "postgresql://postgres:{{ .Values.secrets.smartconnect_bff.postgres_smartconnect_password }}@postgres-smartconnect-service:5432/dialysis_smartconnect"
type: "Opaque"
