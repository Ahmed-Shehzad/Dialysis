---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "ehr-web-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "ehr-web"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "ehr-web"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.ehr_web.ehr_web_image }}"
          name: "ehr-web"
          envFrom:
            - configMapRef:
                name: "ehr-web-config"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 5332
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "25m"
              memory: "64Mi"
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "ehr-web"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
