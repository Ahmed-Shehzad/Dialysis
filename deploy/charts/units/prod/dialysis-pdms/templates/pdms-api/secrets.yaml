---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "pdms-api-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "pdms-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  ConnectionStrings__Pdms: "Host=postgres-pdms-service;Port=5432;Username=postgres;Password={{ .Values.secrets.pdms_api.postgres_pdms_password }};Database=dialysis_pdms"
  PDMS_PASSWORD: "{{ .Values.secrets.pdms_api.postgres_pdms_password }}"
  PDMS_URI: "postgresql://postgres:{{ .Values.secrets.pdms_api.postgres_pdms_password }}@postgres-pdms-service:5432/dialysis_pdms"
  ConnectionStrings__Hangfire: "Host=postgres-pdms-service;Port=5432;Username=postgres;Password={{ .Values.secrets.pdms_api.postgres_pdms_password }};Database=dialysis_pdms"
  HANGFIRE_PASSWORD: "{{ .Values.secrets.pdms_api.postgres_pdms_password }}"
  HANGFIRE_URI: "postgresql://postgres:{{ .Values.secrets.pdms_api.postgres_pdms_password }}@postgres-pdms-service:5432/dialysis_pdms"
type: "Opaque"
