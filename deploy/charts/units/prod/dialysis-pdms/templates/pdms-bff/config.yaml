---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "pdms-bff-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "pdms-bff"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "{{ .Values.config.pdms_bff.OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY }}"
  ASPNETCORE_FORWARDEDHEADERS_ENABLED: "{{ .Values.config.pdms_bff.ASPNETCORE_FORWARDEDHEADERS_ENABLED }}"
  ASPNETCORE_URLS: "{{ .Values.config.pdms_bff.ASPNETCORE_URLS }}"
  Bff__Keycloak__Authority: "{{ .Values.config.pdms_bff.keycloak_authority }}"
  Bff__Module__ModuleApiAddress: "http://pdms-api-service:{{ .Values.parameters.pdms_api.port_http }}"
  ConnectionStrings__rabbitmq: "{{ .Values.config.pdms_bff.rabbitmq_connection }}"
  ConnectionStrings__valkey: "{{ .Values.config.pdms_bff.valkey_connection }}"
  Bff__Events__RabbitMq__ConnectionUri: "{{ .Values.config.pdms_bff.rabbitmq_connection }}"
  Bff__Events__SignalR__BackplaneConnectionString: "{{ .Values.config.pdms_bff.valkey_connection }}"
  HANGFIRE_HOST: "{{ .Values.config.pdms_bff.HANGFIRE_HOST }}"
  HANGFIRE_PORT: "{{ .Values.config.pdms_bff.HANGFIRE_PORT }}"
  HANGFIRE_USERNAME: "{{ .Values.config.pdms_bff.HANGFIRE_USERNAME }}"
  HANGFIRE_JDBCCONNECTIONSTRING: "{{ .Values.config.pdms_bff.HANGFIRE_JDBCCONNECTIONSTRING }}"
  HANGFIRE_DATABASENAME: "{{ .Values.config.pdms_bff.HANGFIRE_DATABASENAME }}"
  Bff__Module__Aggregations__0__Address: "{{ .Values.config.pdms_bff.Bff__Module__Aggregations__0__Address }}"
  Bff__Module__Aggregations__1__Address: "{{ .Values.config.pdms_bff.Bff__Module__Aggregations__1__Address }}"
  Bff__Module__Aggregations__2__Address: "{{ .Values.config.pdms_bff.Bff__Module__Aggregations__2__Address }}"
