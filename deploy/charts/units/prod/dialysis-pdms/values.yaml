parameters:
  pdms_api:
    port_http: 8080
    pdms_api_image: "pdms-api:latest"
  pdms_bff:
    pdms_bff_image: "pdms-bff:latest"
  pdms_web:
    pdms_web_image: "pdms-web:latest"
secrets:
  postgres_pdms:
    postgres_pdms_password: ""
  pdms_api:
    ConnectionStrings__Pdms: ""
    postgres_pdms_password: ""
    PDMS_URI: ""
    ConnectionStrings__Hangfire: ""
    HANGFIRE_URI: ""
  pdms_bff:
    pdms_bff_client_secret: ""
    ConnectionStrings__Hangfire: ""
    postgres_pdms_password: ""
    HANGFIRE_URI: ""
config:
  postgres_pdms:
    POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
    POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    POSTGRES_USER: "postgres"
  pdms_api:
    OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
    ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    HTTP_PORTS: ""
    PDMS_HOST: "postgres-pdms-service"
    PDMS_PORT: "5432"
    PDMS_USERNAME: "postgres"
    PDMS_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-pdms-service:5432/dialysis_pdms"
    PDMS_DATABASENAME: "dialysis_pdms"
    HANGFIRE_HOST: "postgres-pdms-service"
    HANGFIRE_PORT: "5432"
    HANGFIRE_USERNAME: "postgres"
    HANGFIRE_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-pdms-service:5432/dialysis_pdms"
    HANGFIRE_DATABASENAME: "dialysis_pdms"
    rabbitmq_connection: "amqp://guest:CHANGE-ME@rabbitmq-service:5672"
    valkey_connection: "valkey-service:6379,password=CHANGE-ME"
    Pdms__Transponder__EnableOutboxRelay: "true"
    keycloak_authority: "http://keycloak-service:8081/realms/dialysis"
    Pdms__Authentication__Audience: "account"
  pdms_bff:
    OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
    ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
    ASPNETCORE_URLS: "http://+:5303"
    keycloak_authority: "http://keycloak-service:8081/realms/dialysis"
    Bff__Module__ModuleApiAddress: ""
    rabbitmq_connection: "amqp://guest:CHANGE-ME@rabbitmq-service:5672"
    valkey_connection: "valkey-service:6379,password=CHANGE-ME"
    HANGFIRE_HOST: "postgres-pdms-service"
    HANGFIRE_PORT: "5432"
    HANGFIRE_USERNAME: "postgres"
    HANGFIRE_JDBCCONNECTIONSTRING: "jdbc:postgresql://postgres-pdms-service:5432/dialysis_pdms"
    HANGFIRE_DATABASENAME: "dialysis_pdms"
    Bff__Module__Aggregations__0__Address: "http://ehr-api-service:8080"
    Bff__Module__Aggregations__1__Address: "http://hie-api-service:8080"
    Bff__Module__Aggregations__2__Address: "http://smartconnect-api-service:8080"
  pdms_web:
    NODE_ENV: "production"
    BROWSER: "none"
    VITE_GATEWAY_URL: "http://gateway-service:9090"
    VITE_API_BASE_URL: "http://gateway-service:9090"
    PORT: "5333"
