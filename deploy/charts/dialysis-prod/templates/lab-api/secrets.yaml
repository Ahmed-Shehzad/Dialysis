---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "lab-api-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "lab-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  ConnectionStrings__Lab: "Host=postgres-lab-service;Port=5432;Username=postgres;Password={{ .Values.secrets.lab_api.postgres_lab_password }};Database=dialysis_lab"
  LAB_PASSWORD: "{{ .Values.secrets.lab_api.postgres_lab_password }}"
  LAB_URI: "postgresql://postgres:{{ .Values.secrets.lab_api.postgres_lab_password }}@postgres-lab-service:5432/dialysis_lab"
  ConnectionStrings__rabbitmq: "amqp://guest:{{ .Values.secrets.lab_api.rabbitmq_password }}@rabbitmq-service:5672"
  RABBITMQ_PASSWORD: "{{ .Values.secrets.lab_api.rabbitmq_password }}"
  RABBITMQ_URI: "amqp://guest:{{ .Values.secrets.lab_api.rabbitmq_password }}@rabbitmq-service:5672"
  ConnectionStrings__valkey: "valkey-service:6379,password={{ .Values.secrets.lab_api.valkey_password }}"
  VALKEY_PASSWORD: "{{ .Values.secrets.lab_api.valkey_password }}"
  VALKEY_URI: "valkey://:{{ .Values.secrets.lab_api.valkey_password }}@valkey-service:6379"
  Lab__Transponder__RabbitMq__ConnectionUri: "amqp://guest:{{ .Values.secrets.lab_api.rabbitmq_password }}@rabbitmq-service:5672"
  Lab__DistributedCache__Valkey__ConnectionString: "valkey-service:6379,password={{ .Values.secrets.lab_api.valkey_password }}"
type: "Opaque"
