---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "admin-bff-deployment"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "admin-bff"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "admin-bff"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.admin_bff.admin_bff_image }}"
          name: "admin-bff"
          envFrom:
            - configMapRef:
                name: "admin-bff-config"
            - secretRef:
                name: "admin-bff-secrets"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 5306
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "admin-bff"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
