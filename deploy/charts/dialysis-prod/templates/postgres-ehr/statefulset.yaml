---
apiVersion: "apps/v1"
kind: "StatefulSet"
metadata:
  name: "postgres-ehr-statefulset"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "postgres-ehr"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "{{ .Chart.Name }}"
        app.kubernetes.io/component: "postgres-ehr"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "docker.io/postgres:17-alpine"
          name: "postgres-ehr"
          envFrom:
            - configMapRef:
                name: "postgres-ehr-config"
            - secretRef:
                name: "postgres-ehr-secrets"
          ports:
            - name: "tcp"
              protocol: "TCP"
              containerPort: 5432
          resources:
            limits:
              cpu: "1000m"
              memory: "2Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
          volumeMounts:
            - name: "dialysis-postgres-ehr-data"
              mountPath: "/var/lib/postgresql/data"
          imagePullPolicy: "IfNotPresent"
      volumes:
        - name: "dialysis-postgres-ehr-data"
          emptyDir: {}
  selector:
    matchLabels:
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/component: "postgres-ehr"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  persistentVolumeClaimRetentionPolicy: {}
  updateStrategy:
    rollingUpdate: {}
    type: "RollingUpdate"
