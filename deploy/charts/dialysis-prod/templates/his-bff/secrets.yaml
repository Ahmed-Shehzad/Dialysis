---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "his-bff-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "his-bff"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  Bff__Keycloak__ClientSecret: "{{ .Values.secrets.his_bff.his_bff_client_secret }}"
  ConnectionStrings__rabbitmq: "amqp://guest:{{ .Values.secrets.his_bff.rabbitmq_password }}@rabbitmq-service:5672"
  RABBITMQ_PASSWORD: "{{ .Values.secrets.his_bff.rabbitmq_password }}"
  RABBITMQ_URI: "amqp://guest:{{ .Values.secrets.his_bff.rabbitmq_password }}@rabbitmq-service:5672"
  ConnectionStrings__valkey: "valkey-service:6379,password={{ .Values.secrets.his_bff.valkey_password }}"
  VALKEY_PASSWORD: "{{ .Values.secrets.his_bff.valkey_password }}"
  VALKEY_URI: "valkey://:{{ .Values.secrets.his_bff.valkey_password }}@valkey-service:6379"
  Bff__Events__RabbitMq__ConnectionUri: "amqp://guest:{{ .Values.secrets.his_bff.rabbitmq_password }}@rabbitmq-service:5672"
  Bff__Events__SignalR__BackplaneConnectionString: "valkey-service:6379,password={{ .Values.secrets.his_bff.valkey_password }}"
type: "Opaque"
