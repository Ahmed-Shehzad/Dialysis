server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security baseline — gateway adds the rest.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Emit `charset=utf-8` on text Content-Types (nginx's default charset_types
    # omits css/js/json/svg, so list them explicitly).
    charset utf-8;
    charset_types text/css text/plain text/xml application/javascript application/json image/svg+xml;

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Reverse-proxy API + auth + realtime to the YARP gateway service.
    location /api/    { proxy_pass http://gateway:8080; include /etc/nginx/proxy_params.conf; }
    location /fhir/   { proxy_pass http://gateway:8080; include /etc/nginx/proxy_params.conf; }
    location /identity/ { proxy_pass http://gateway:8080; include /etc/nginx/proxy_params.conf; }
    location /auth/   { proxy_pass http://gateway:8080; include /etc/nginx/proxy_params.conf; }
    location /hubs/   {
        proxy_pass http://gateway:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1h;
    }
}
