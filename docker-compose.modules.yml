name: dialysis

# Self-contained full-stack compose: per-module infra + every module host + edge gateway + web SPA.
#
#   docker compose -f docker-compose.modules.yml up -d
#
# This is the production-like / deployment topology (Release container images, HSTS, forwarded
# headers, Keycloak authority required). For the local dev inner loop use the Aspire AppHost
# instead — `dotnet run --project src/aspire/Dialysis.AppHost` — which runs the same shape via
# `dotnet run` plus the Aspire dashboard. There is intentionally no base infra-only compose:
# Aspire owns dev, this file owns containerized deployment.
#
# Per-module Postgres (one container per module — locks in the modular-monolith "each module
# owns its own DB" invariant) + shared RabbitMQ + Valkey + Keycloak + OTLP collector. Each
# module host is independently scalable — bump `replicas` (or `--scale <svc>=N`) to scale
# horizontally; Valkey backs the distributed cache + ASP.NET Data Protection key ring so
# multi-replica is safe.

services:
  # --- Infrastructure ------------------------------------------------------
  postgres-his:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dialysis_his
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5440:5432"
    volumes:
      - postgres-his-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_his"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-smartconnect:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dialysis_smartconnect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5441:5432"
    volumes:
      - postgres-smartconnect-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_smartconnect"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-ehr:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dialysis_ehr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5442:5432"
    volumes:
      - postgres-ehr-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_ehr"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-pdms:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dialysis_pdms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5443:5432"
    volumes:
      - postgres-pdms-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_pdms"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-identity:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dialysis_identity
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5444:5432"
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_identity"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-hie:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: dialysis_hie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5445:5432"
    volumes:
      - postgres-hie-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dialysis_hie"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: dialysis
      RABBITMQ_DEFAULT_PASS: dialysis
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: ["start-dev"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8081:8080"

  # OTLP collector for module spans + metrics. Module hosts inside this compose point
  # `<Module>:Telemetry:OtlpEndpoint` at http://otel-collector:4317.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP

  # --- Module hosts --------------------------------------------------------
  his-api:
    build:
      context: .
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/HIS/Dialysis.HIS.Api/Dialysis.HIS.Api.csproj
        MODULE_DLL: Dialysis.HIS.Api.dll
    image: dialysis/his-api:dev
    depends_on:
      postgres-his: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      valkey: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__His: Host=postgres-his;Port=5432;Database=dialysis_his;Username=postgres;Password=postgres
      His__UseForwardedHeaders: "true"
      His__UseHsts: "true"
      His__Transponder__EnableOutboxRelay: "true"
      His__Transponder__RabbitMq__ConnectionUri: amqp://dialysis:dialysis@rabbitmq:5672/
      His__Authentication__Authority: http://keycloak:8080/realms/dialysis
      His__Authentication__Audience: account
      His__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      His__DistributedCache__Valkey__ConnectionString: valkey:6379,abortConnect=false
      His__DistributedCache__Valkey__InstanceName: his
      His__Telemetry__OtlpEndpoint: http://otel-collector:4317
    ports:
      - "5288:8080"
    deploy:
      replicas: 1

  ehr-api:
    build:
      context: .
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/EHR/Dialysis.EHR.Api/Dialysis.EHR.Api.csproj
        MODULE_DLL: Dialysis.EHR.Api.dll
    image: dialysis/ehr-api:dev
    depends_on:
      postgres-ehr: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      valkey: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Ehr: Host=postgres-ehr;Port=5432;Database=dialysis_ehr;Username=postgres;Password=postgres
      Ehr__UseForwardedHeaders: "true"
      Ehr__UseHsts: "true"
      Ehr__Transponder__EnableOutboxRelay: "true"
      Ehr__Transponder__RabbitMq__ConnectionUri: amqp://dialysis:dialysis@rabbitmq:5672/
      Ehr__Authentication__Authority: http://keycloak:8080/realms/dialysis
      Ehr__Authentication__Audience: account
      Ehr__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      Ehr__DistributedCache__Valkey__ConnectionString: valkey:6379,abortConnect=false
      Ehr__DistributedCache__Valkey__InstanceName: ehr
      Ehr__Telemetry__OtlpEndpoint: http://otel-collector:4317
      Ehr__Demo__Enabled: "true"
      Ehr__Demo__RegistrationSimulator: "true"
    ports:
      - "5289:8080"
    deploy:
      replicas: 1

  pdms-api:
    build:
      context: .
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/PDMS/Dialysis.PDMS.Api/Dialysis.PDMS.Api.csproj
        MODULE_DLL: Dialysis.PDMS.Api.dll
    image: dialysis/pdms-api:dev
    depends_on:
      postgres-pdms: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      valkey: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Pdms: Host=postgres-pdms;Port=5432;Database=dialysis_pdms;Username=postgres;Password=postgres
      Pdms__UseForwardedHeaders: "true"
      Pdms__UseHsts: "true"
      Pdms__Transponder__EnableOutboxRelay: "true"
      Pdms__Transponder__RabbitMq__ConnectionUri: amqp://dialysis:dialysis@rabbitmq:5672/
      Pdms__Authentication__Authority: http://keycloak:8080/realms/dialysis
      Pdms__Authentication__Audience: account
      Pdms__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      Pdms__DistributedCache__Valkey__ConnectionString: valkey:6379,abortConnect=false
      Pdms__DistributedCache__Valkey__InstanceName: pdms
      Pdms__Telemetry__OtlpEndpoint: http://otel-collector:4317
      Pdms__Demo__Enabled: "true"
      Pdms__Demo__VitalsTicker: "true"
      Pdms__Demo__MachineTelemetrySimulator: "true"
    ports:
      - "5290:8080"
    deploy:
      replicas: 1

  smartconnect-api:
    build:
      context: .
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/SmartConnect/Api/Dialysis.SmartConnect.Api/Dialysis.SmartConnect.Api.csproj
        MODULE_DLL: Dialysis.SmartConnect.Api.dll
    image: dialysis/smartconnect-api:dev
    depends_on:
      postgres-smartconnect: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      valkey: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SmartConnect: Host=postgres-smartconnect;Port=5432;Database=dialysis_smartconnect;Username=postgres;Password=postgres
      SmartConnect__UseHsts: "true"
      SmartConnect__Transponder__EnableOutboxRelay: "true"
      SmartConnect__Transponder__RabbitMq__ConnectionUri: amqp://dialysis:dialysis@rabbitmq:5672/
      SmartConnect__Authentication__Authority: http://keycloak:8080/realms/dialysis
      SmartConnect__Authentication__Audience: account
      SmartConnect__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      SmartConnect__DistributedCache__Valkey__ConnectionString: valkey:6379,abortConnect=false
      SmartConnect__DistributedCache__Valkey__InstanceName: smartconnect
      SmartConnect__Telemetry__OtlpEndpoint: http://otel-collector:4317
      SmartConnect__Demo__Enabled: "true"
      SmartConnect__Demo__Hl7Simulator: "true"
    ports:
      - "5291:8080"
    deploy:
      replicas: 1

  hie-api:
    build:
      context: .
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/HIE/Dialysis.HIE.Api/Dialysis.HIE.Api.csproj
        MODULE_DLL: Dialysis.HIE.Api.dll
    image: dialysis/hie-api:dev
    depends_on:
      postgres-hie: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      valkey: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Hie: Host=postgres-hie;Port=5432;Database=dialysis_hie;Username=postgres;Password=postgres
      Hie__UseHsts: "true"
      Hie__Transponder__RabbitMq__ConnectionUri: amqp://dialysis:dialysis@rabbitmq:5672/
      Hie__Authentication__Authority: http://keycloak:8080/realms/dialysis
      Hie__Authentication__Audience: account
      Hie__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      Hie__DistributedCache__Valkey__ConnectionString: valkey:6379,abortConnect=false
      Hie__DistributedCache__Valkey__InstanceName: hie
      Hie__Telemetry__OtlpEndpoint: http://otel-collector:4317
      Hie__Demo__Enabled: "true"
    ports:
      - "5292:8080"
    deploy:
      replicas: 1

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: dialysis/gateway:dev
    depends_on:
      his-api: { condition: service_started }
      ehr-api: { condition: service_started }
      pdms-api: { condition: service_started }
      smartconnect-api: { condition: service_started }
      hie-api: { condition: service_started }
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Gateway__Authority: http://keycloak:8080/realms/dialysis
      Gateway__Audience: account
      Gateway__RequireAuthentication: "true"
      Gateway__Cors__AllowedOrigins__0: http://localhost:8080
      Gateway__Cors__AllowedOrigins__1: http://web
    ports:
      - "5000:8080"
    deploy:
      replicas: 1

  web:
    build:
      context: src/frontend/dialysis-web
      dockerfile: Dockerfile
    image: dialysis/web:dev
    depends_on:
      gateway: { condition: service_started }
    ports:
      - "8080:80"
    deploy:
      replicas: 1

volumes:
  postgres-his-data:
  postgres-smartconnect-data:
  postgres-ehr-data:
  postgres-pdms-data:
  postgres-identity-data:
  postgres-hie-data:
  valkey-data:
