name: dialysis-modules

# Module-host orchestration overlay. Run alongside the base infra compose:
#
#   docker compose -f docker-compose.yml -f docker-compose.modules.yml up -d
#
# Brings up each module host pointed at its own Postgres, sharing one RabbitMQ + Valkey + Keycloak.
# Each module is independently scalable — bump `replicas` to scale horizontally; Valkey backs the
# distributed cache + ASP.NET Data Protection key ring so multi-replica is safe.

services:
  his-api:
    build:
      context: .
      dockerfile: Dockerfile.module
      args:
        MODULE_PROJECT: src/backend/HIS/Dialysis.HIS.Api/Dialysis.HIS.Api.csproj
        MODULE_DLL: Dialysis.HIS.Api.dll
    image: dialysis/his-api:dev
    depends_on:
      postgres-his: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      valkey: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__His: Host=postgres-his;Port=5432;Database=dialysis_his;Username=postgres;Password=postgres
      His__UseForwardedHeaders: "true"
      His__UseHsts: "true"
      His__Transponder__EnableOutboxRelay: "true"
      His__Transponder__RabbitMq__ConnectionUri: amqp://dialysis:dialysis@rabbitmq:5672/
      His__Authentication__Authority: http://keycloak:8080/realms/dialysis
      His__Authentication__Audience: account
      His__Authentication__RequireAuthorityWhenNotDevelopment: "true"
      His__DistributedCache__Valkey__ConnectionString: valkey:6379,abortConnect=false
      His__DistributedCache__Valkey__InstanceName: his
      His__Telemetry__OtlpEndpoint: http://otel-collector:4317
    ports:
      - "5288:8080"
    deploy:
      replicas: 1

