# GitVersion — derives a Semantic Version from git history, so nobody hand-edits a
# version string. Read by the GitVersion CLI (gitversion.tool, pinned to 6.7.0 in
# .config/dotnet-tools.json) and by the NUKE build, which downloads the same tool via
# build/_build.csproj and stamps Pack output with the derived version.
#
# Schema: GitVersion v6 (config version v3). Run `dotnet gitversion /showconfig` to see
# the fully-merged effective configuration, or `./build.sh ShowVersion` for the numbers.
#
# ── Branching model: GitFlow release ladder ──────────────────────────────────────────
#   develop                      integration trunk — alpha channel
#   staging                      pre-production soak — beta channel
#   main                         releasable; production deploys from here
#   feature/*, feat/*, claude/*  short-lived branches that merge into develop via PR
#
# The ladder maps 1:1 onto the GitHub deployment environments (dev/staging/production)
# and produces stage-labelled, monotonically sorting versions per channel:
#
#   feature/x or claude/x         ->  1.5.0-<branch>.5
#   develop, N commits ahead      ->  1.5.0-alpha.N
#   staging, after promotion      ->  1.5.0-beta.N
#   main, untagged                ->  1.5.0-ci.N
#   main, tagged v1.5.0           ->  1.5.0          (the clean release)
#   pull request #179             ->  1.5.0-PullRequest0179.5
#
# alpha < beta < ci < (clean) sorts correctly under SemVer 2.0 precedence, so a binary's
# version alone tells you which stage built it. Releases are cut by tagging a commit on
# main as `vX.Y.Z` (leading `v` optional). Until the first tag exists, `next-version`
# below seeds the base version.

# Start from GitFlow's well-tested branch ruleset (develop/release/hotfix semantics) and
# override only what we need: our `staging` branch plays the role of GitFlow's release
# branch, and `claude/*` branches version like features.
workflow: GitFlow/v1

# Base version used ONLY while the repo has no version tag. The first `vX.Y.Z` tag on
# main supersedes this permanently — after that, the tag drives the version.
next-version: '1.0.0'

# Accept release tags written either `v1.4.0` or `1.4.0`.
tag-prefix: '[vV]?'

# AssemblyVersion / AssemblyFileVersion get Major.Minor.Patch.0 (a clean four-part
# number that tooling is happy with); the full SemVer + commit sha ride in the
# AssemblyInformationalVersion so a deployed binary is traceable back to a commit.
assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatch
assembly-informational-format: '{InformationalVersion}'

# Explicit bump control from the commit message footer, e.g. `+semver: minor` (or
# `+semver: none` to suppress a bump). These are GitVersion's defaults, restated here
# so the contract is discoverable in-repo rather than implicit.
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'

branches:
  main:
    # Untagged commits on main are pre-releases labelled `ci` (e.g. 1.5.0-ci.3) so they
    # read as CI builds and sort below the eventual clean release. Tagging `vX.Y.Z`
    # makes that commit the clean release — a tag always overrides this label.
    increment: Patch
    label: 'ci'
    # Promotions arrive from staging (and hotfixes directly when needed).
    source-branches: ['staging', 'hotfix']
  develop:
    # GitFlow default: alpha channel, minor increments (each cycle on develop works
    # toward the next minor). Restated for in-repo discoverability.
    increment: Minor
    label: 'alpha'
  staging:
    # Our long-lived staging branch plays GitFlow's release-branch role: the beta soak
    # for whatever develop promoted. No own increment — it carries the version it
    # inherits from develop at promotion time.
    regex: '^staging$'
    label: 'beta'
    increment: None
    source-branches: ['develop', 'main']
    # Lets develop's tracks-release-branches semantics see staging as the release lane,
    # so develop versions ahead of what staging is soaking.
    is-release-branch: true
  feature:
    # Broaden the stock feature regex so AI-authored `claude/*` branches version exactly
    # like a normal `feature/*` / `feat/*` branch: a pre-release labelled with the branch
    # name. The `(?<BranchName>...)` named capture group is REQUIRED — the
    # `label: {BranchName}` template (from GitFlow/v1) binds to it; without the group the
    # placeholder renders literally as `{BranchName}`.
    regex: '^(?:features?|feat|claude)[/-](?<BranchName>.+)'
    # Features can branch off develop or main (hotfix-style work on a claude/* branch).
    source-branches: ['develop', 'main', 'release', 'staging', 'hotfix', 'support']

# No commits are excluded from version calculation.
ignore:
  sha: []
